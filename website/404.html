<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page not found - ShardLoom</title>
  <meta name="robots" content="noindex">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #07110f;
      color: #eef7f2;
      font: 16px/1.55 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(640px, calc(100% - 32px));
      border: 1px solid #2b4039;
      border-radius: 8px;
      padding: 32px;
      background: #101b18;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 7vw, 4rem);
      letter-spacing: 0;
    }

    p {
      color: #a9bbb3;
      margin: 0 0 24px;
    }

    a {
      color: #07110f;
      display: inline-block;
      padding: 10px 14px;
      border-radius: 8px;
      background: #74e0b4;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Not found</h1>
    <p>The ShardLoom site is intentionally small. The page you requested is not available.</p>
    <a href="/">Return home</a>
  </main>
</body>
</html>
