<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page not found - ShardLoom</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/assets/logo/shardloom-favicon.png">
  <link rel="apple-touch-icon" href="/assets/logo/shardloom-favicon.png">
  <style>
    :root {
      --page: #f7fafb;
      --ink: #071229;
      --muted: #516170;
      --line: #d5e1e7;
      --navy: #06164d;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--page);
      color: var(--ink);
      font: 16px/1.55 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(640px, calc(100% - 32px));
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 32px;
      background: #fff;
      box-shadow: 0 20px 60px rgba(7, 18, 41, 0.12);
    }

    img {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      border: 1px solid var(--line);
      object-fit: cover;
    }

    h1 {
      margin: 18px 0 12px;
      font-size: clamp(2rem, 7vw, 4rem);
      letter-spacing: 0;
    }

    p {
      color: var(--muted);
      margin: 0 0 24px;
    }

    a {
      color: #fff;
      display: inline-block;
      padding: 10px 14px;
      border-radius: 8px;
      background: var(--navy);
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <img src="/assets/logo/shardloom-favicon.png" alt="" width="44" height="44" aria-hidden="true">
    <h1>Not found</h1>
    <p>The ShardLoom site is intentionally small. The page you requested is not available.</p>
    <a href="/">Return home</a>
  </main>
</body>
</html>
