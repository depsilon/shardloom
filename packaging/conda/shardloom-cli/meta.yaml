{% set version = "0.1.0" %}

package:
  name: shardloom-cli
  version: {{ version }}

source:
  path: ../../..

build:
  number: 0
  script:
    - set CARGO_PROFILE_RELEASE_STRIP=symbols  # [win]
    - set CARGO_PROFILE_RELEASE_LTO=fat  # [win]
    - cargo auditable install --locked --no-track --bins --root "%LIBRARY_PREFIX%" --path .  # [win]
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml  # [win]
    - export CARGO_PROFILE_RELEASE_STRIP=symbols  # [unix]
    - export CARGO_PROFILE_RELEASE_LTO=fat  # [unix]
    - cargo auditable install --locked --no-track --bins --root "${PREFIX}" --path .  # [unix]
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml  # [unix]

requirements:
  build:
    - {{ stdlib("c") }}
    - {{ compiler("c") }}
    - {{ compiler("rust") }}
    - cargo-auditable
    - cargo-bundle-licenses

test:
  commands:
    - shardloom status --format json

about:
  home: https://shardloom.io
  license: Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Standalone ShardLoom CLI for Vortex-native no-fallback local compute.
  description: |
    Platform-specific ShardLoom CLI binary package for evidence-certified local
    Vortex workflows. This package is not a fallback engine wrapper and does
    not depend on Spark, DataFusion, DuckDB, Polars, pandas, Dask, or Velox for
    runtime execution.
  doc_url: https://github.com/depsilon/shardloom/tree/main/docs
  dev_url: https://github.com/depsilon/shardloom

extra:
  recipe-maintainers:
    - depsilon
