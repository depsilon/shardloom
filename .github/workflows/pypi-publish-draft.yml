name: PyPI Trusted Publisher Draft

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Registry channel to publish to after approval."
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi
      publish_approved:
        description: "Type publish-approved to run the selected Trusted Publisher job."
        required: true
        default: "no"
      testpypi_proof_ref:
        description: "Required for channel=pypi; reference to the passed TestPyPI install/uninstall/smoke proof."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    if: ${{ inputs.publish_approved == 'publish-approved' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout@v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@0c1db6b5cd106c87b8cd4f7a33219e8f23784db9 # Swatinem/rust-cache@v2
      - name: Build Python package with bundled CLI
        run: |
          python -m pip install --upgrade pip build
          python scripts/sync_workspace_package_versions.py --check
          python scripts/check_workspace_version_sources.py
          cargo build -p shardloom-cli --bin shardloom
          python - <<'PY'
          from pathlib import Path
          import sys

          sys.path.insert(0, "scripts")
          from release_dry_run_proof import (
              build_python_artifacts,
              shardloom_binary,
              stage_python_package_with_bundled_cli,
          )

          repo_root = Path(".").resolve()
          stage_dir = repo_root / "target" / "pypi-python-package-stage"
          dist_dir = stage_dir / "dist"
          steps = [
              stage_python_package_with_bundled_cli(
                  repo_root,
                  stage_dir,
                  shardloom_binary(repo_root),
              ),
          ]
          if steps[0]["returncode"] == 0:
              steps.append(build_python_artifacts(repo_root, stage_dir, dist_dir))
          failures = [
              f"{step['name']}: {step.get('stderr') or step.get('stdout')}"
              for step in steps
              if step["returncode"] != 0
          ]
          if failures:
              raise SystemExit("; ".join(failures))
          PY
      - name: Upload Python dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact@v7
        with:
          name: python-dist
          path: target/pypi-python-package-stage/dist/*
          if-no-files-found: error

  publish-testpypi:
    needs: build
    if: ${{ inputs.publish_approved == 'publish-approved' && inputs.channel == 'testpypi' }}
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download Python dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact@v8
        with:
          name: python-dist
          path: python/dist
      - name: Publish to TestPyPI with Trusted Publisher
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
          repository-url: https://test.pypi.org/legacy/

  validate-pypi-prior-proof:
    needs: build
    if: ${{ inputs.publish_approved == 'publish-approved' && inputs.channel == 'pypi' && inputs.testpypi_proof_ref != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout@v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Validate prior TestPyPI proof transcript
        env:
          TESTPYPI_PROOF_REF: ${{ inputs.testpypi_proof_ref }}
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import sys

          sys.path.insert(0, "scripts")
          from release_report_utils import workspace_package_version

          def resolve_python_package_version() -> str:
              return workspace_package_version(pathlib.Path("."))

          proof_ref = pathlib.PurePosixPath(
              pathlib.Path(os.environ["TESTPYPI_PROOF_REF"]).as_posix()
          )
          if proof_ref.is_absolute() or ".." in proof_ref.parts:
              raise SystemExit("testpypi_proof_ref must be a repository-relative path")
          proof_path = pathlib.Path(proof_ref)
          proof = json.loads(proof_path.read_text(encoding="utf-8"))
          expected_version = resolve_python_package_version()
          required = {
              "schema_version": "shardloom.python_registry_package_proof.v1",
              "proof_status": "passed",
              "channel_id": "testpypi",
              "package_name": "shardloom",
              "package_version": expected_version,
              "install_transcript_status": "passed",
              "smoke_check_status": "passed",
              "uninstall_transcript_status": "passed",
              "fallback_attempted": False,
              "external_engine_invoked": False,
              "registry_upload_attempted_by_this_tool": False,
              "publication_attempted_by_this_tool": False,
              "package_channel_submission_attempted_by_this_tool": False,
              "cli_binary_required_for_clean_registry_smoke": True,
              "cli_binary_available": True,
              "cli_binary_smoke_source": "approved_release_or_local_artifact",
          }
          mismatches = [
              f"{key}={proof.get(key)!r} expected {expected!r}"
              for key, expected in required.items()
              if proof.get(key) != expected
          ]
          if not isinstance(proof.get("cli_binary_ref"), str) or not proof["cli_binary_ref"]:
              mismatches.append("cli_binary_ref missing")
          if mismatches:
              raise SystemExit("invalid TestPyPI proof: " + "; ".join(mismatches))
          PY

  publish:
    needs:
      - build
      - validate-pypi-prior-proof
    if: ${{ inputs.publish_approved == 'publish-approved' && inputs.channel == 'pypi' && inputs.testpypi_proof_ref != '' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download Python dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact@v8
        with:
          name: python-dist
          path: python/dist
      - name: Publish to PyPI with Trusted Publisher
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
