name: CI

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  PYTHONUNBUFFERED: "1"

jobs:
  rust-baseline:
    name: Rust baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace --all-targets

  rust-feature-matrix:
    name: Rust feature matrix (${{ matrix.lane }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: default_features
            command: cargo check --workspace
          - lane: all_features
            command: cargo check --workspace --all-features
          - lane: no_default_features
            command: cargo check --workspace --no-default-features
          - lane: upstream_vortex
            command: cargo check -p shardloom-vortex --features upstream-vortex
          - lane: vortex_file_io
            command: cargo check -p shardloom-vortex --features vortex-file-io
          - lane: vortex_local_primitives
            command: cargo check -p shardloom-vortex --features vortex-local-primitives
          - lane: vortex_encoded_read_spike
            command: cargo check -p shardloom-vortex --features vortex-encoded-read-spike
          - lane: packaging_deployment
            command: cargo test -p shardloom-contract-tests --test conda_packaging_recipes
          - lane: benchmark_extras
            command: cargo check -p shardloom-vortex --features vortex-traditional-analytics-benchmark
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: feature-${{ matrix.lane }}
      - name: Run feature lane
        run: ${{ matrix.command }}

  python-test-shards:
    name: Python test shard (${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard:
          - core
          - front_door_benchmark_publication
          - release_scripts
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Python test shard
        run: python scripts/run_python_test_shard.py --shard ${{ matrix.shard }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: python-test-shard-${{ matrix.shard }}
          path: target/python-test-shards/${{ matrix.shard }}.json
          if-no-files-found: ignore
          retention-days: 14

  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    needs:
      - python-test-shards
    if: always()
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Reuse Python test shard evidence
        uses: actions/download-artifact@v8
        with:
          pattern: python-test-shard-*
          path: target/python-test-shards
          merge-multiple: true
      - name: Python compile check
        run: python -m compileall -q python/src python/tests scripts examples benchmarks/traditional_analytics
      - name: Merge Python test shard evidence
        run: python scripts/merge_python_test_shard_evidence.py
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: python-test-evidence
          path: target/python-test-evidence.json
          if-no-files-found: ignore
          retention-days: 14

  python-package:
    name: Python and package smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install Python build tooling
        run: python -m pip install --upgrade pip build
      - name: Python package build
        run: python -m build python
      - name: Local package smoke
        run: python scripts/release_dry_run_proof.py --rows 8 --iterations 1 --skip-clean-conda
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: python-package-smoke-evidence
          path: |
            python/dist
            target/debug/shardloom
            target/release-dry-run-proof
            target/release-provenance-dry-run
          if-no-files-found: ignore
          retention-days: 14
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: release-local-smoke-evidence
          path: |
            python/dist
            target/debug/shardloom
            target/release-dry-run-proof
            target/release-provenance-dry-run
          if-no-files-found: ignore
          retention-days: 14

  dependency-security:
    name: Dependency and security gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install audit tooling
        run: |
          python -m pip install --upgrade pip build pip-audit==2.10.0
          cargo install cargo-deny --locked --version 0.19.6
          cargo install cargo-audit --locked --version 0.22.1
      - name: Dependency/license/provenance audit
        run: python scripts/check_dependency_audit.py --release-gate --json-output target/dependency-audit-report.json
      - name: Open-source security posture
        run: python scripts/check_security_posture.py
      - name: Supply-chain provenance dry run
        run: python scripts/release_provenance_dry_run.py
      - name: Release security gate
        run: python scripts/check_release_security_gate.py
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: dependency-security-evidence
          path: |
            target/dependency-audit-report.json
            target/security-posture-report.json
            target/release-provenance-dry-run
            target/release-security-gate-report.json
          if-no-files-found: ignore
          retention-days: 14

  release-runtime-core:
    name: Release runtime core evidence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Golden workflow validator
        run: python scripts/check_golden_workflows.py
      - name: Admitted semantics matrix
        run: python scripts/check_admitted_semantics_matrix.py
      - name: Architecture tracker
        run: python scripts/check_release_architecture_tracker.py --allow-blocked
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: release-runtime-core-evidence
          path: |
            target/golden-workflow-report.json
            target/golden-workflows
            target/admitted-semantics-matrix-report.json
            target/admitted-semantics-matrix
            target/release-architecture-tracker-report.json
          if-no-files-found: ignore
          retention-days: 14

  release-package-governance:
    name: Release package and governance evidence
    runs-on: ubuntu-latest
    needs:
      - dependency-security
      - python-package
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Reuse dependency/security evidence
        uses: actions/download-artifact@v8
        with:
          name: dependency-security-evidence
          path: target/downloads/dependency-security-evidence
      - name: Reuse local package smoke evidence
        uses: actions/download-artifact@v8
        with:
          name: release-local-smoke-evidence
          path: target/downloads/release-local-smoke-evidence
      - name: Merge package/governance input evidence
        run: |
          python scripts/merge_release_evidence_artifacts.py \
            --artifact target/downloads/dependency-security-evidence \
            --artifact target/downloads/release-local-smoke-evidence
          test -f target/dependency-audit-report.json
          test -f target/release-dry-run-proof/transcript.json
          test -f target/release-provenance-dry-run/supply-chain-release-evidence.json
          python - <<'PY'
          from pathlib import Path
          assert Path("target/debug/shardloom").is_file()
          assert list(Path("python/dist").glob("shardloom-*.whl"))
          assert list(Path("python/dist").glob("shardloom-*.tar.gz"))
          PY
      - name: Contribution governance
        run: python scripts/check_contribution_governance.py
      - name: Package-channel readiness
        run: python scripts/check_package_channel_readiness.py --require-local-evidence
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: release-package-governance-evidence
          path: |
            target/contribution-governance-report.json
            target/package-channel-readiness-report.json
          if-no-files-found: ignore
          retention-days: 14

  release-user-surface:
    name: Release user-surface evidence
    runs-on: ubuntu-latest
    needs:
      - python-package
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Reuse local package smoke evidence
        uses: actions/download-artifact@v8
        with:
          name: release-local-smoke-evidence
          path: target/downloads/release-local-smoke-evidence
      - name: Merge local package smoke evidence
        run: |
          python scripts/merge_release_evidence_artifacts.py \
            --artifact target/downloads/release-local-smoke-evidence
          test -f target/release-dry-run-proof/transcript.json
      - name: Python user-surface completion gate
        run: python scripts/check_python_user_surface_completion.py
      - name: SQL/Python/DataFrame parity gate
        run: python scripts/check_sql_python_dataframe_parity.py
      - name: V1 front-door runtime scope gate
        run: python scripts/check_v1_front_door_runtime_scope.py
      - name: V1 Vortex runtime scope gate
        run: python scripts/check_v1_vortex_runtime_scope.py
      - name: V1 SourceState/prepared-state scope gate
        run: python scripts/check_v1_source_prepared_state_scope.py
      - name: V1 local output/sink scope gate
        run: python scripts/check_v1_local_output_sink_scope.py
      - name: User-surface runtime gap inventory
        run: python scripts/check_user_surface_runtime_gap_inventory.py
      - name: User-surface graduation matrix
        run: python scripts/check_user_surface_graduation_matrix.py
      - name: Runtime gap family burn-down
        run: python scripts/check_runtime_gap_family_burn_down.py
      - name: User route capability report
        run: python scripts/check_user_route_capability_report.py
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: release-user-surface-evidence
          path: |
            target/python-user-surface-completion-gate.json
            target/sql-python-dataframe-parity-gate.json
            target/v1-front-door-runtime-scope-report.json
            target/v1-vortex-runtime-scope-report.json
            target/v1-source-prepared-state-scope-report.json
            target/v1-local-output-sink-scope-report.json
            target/user-surface-runtime-gap-inventory.json
            target/user-surface-graduation-matrix.json
            target/runtime-gap-family-burn-down.json
            target/user-route-capability-report.json
          if-no-files-found: ignore
          retention-days: 14

  release-benchmark-claim:
    name: Release benchmark claim evidence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Pre-5J dependency freshness gate
        if: github.event_name == 'pull_request'
        run: python scripts/check_pre_5j_dependency_freshness.py
      - name: Pre-5J dependency freshness gate (live GitHub)
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/check_pre_5j_dependency_freshness.py --require-live-github
      - name: Benchmark artifact completeness
        run: python scripts/check_benchmark_artifact_completeness.py --manifest website/assets/benchmarks/latest/manifest.json --output target/benchmark-artifact-completeness-report.json
      - name: Benchmark publication claim gate
        continue-on-error: true
        run: python scripts/check_benchmark_publication_claim_gate.py --manifest website/assets/benchmarks/latest/manifest.json --allow-stale-git
      - name: Front-door benchmark publication gate
        run: python scripts/check_front_door_benchmark_publication.py --manifest website/assets/benchmarks/latest/manifest.json --allow-stale-git
      - name: Benchmark optimization targets
        run: python scripts/check_benchmark_optimization_targets.py --artifact website/assets/benchmarks/latest/benchmark-results.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: release-benchmark-claim-evidence
          path: |
            target/pre-5j-dependency-freshness-gate.json
            target/benchmark-artifact-completeness-report.json
            target/benchmark-publication-claim-gate-report.json
            target/front-door-benchmark-publication-gate.json
            target/benchmark-optimization-targets-report.json
          if-no-files-found: ignore
          retention-days: 14

  release-readiness:
    name: Release readiness reports
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - ci-gate-matrix
      - dependency-security
      - python-tests
      - python-package
      - release-runtime-core
      - release-package-governance
      - release-user-surface
      - release-benchmark-claim
      - website-docs
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Reuse CI gate matrix evidence
        uses: actions/download-artifact@v8
        with:
          name: ci-gate-matrix-report
          path: target/downloads/ci-gate-matrix-report
      - name: Reuse dependency/security evidence
        uses: actions/download-artifact@v8
        with:
          name: dependency-security-evidence
          path: target/downloads/dependency-security-evidence
      - name: Reuse local package smoke evidence
        uses: actions/download-artifact@v8
        with:
          name: release-local-smoke-evidence
          path: target/downloads/release-local-smoke-evidence
      - name: Reuse Python test evidence
        uses: actions/download-artifact@v8
        with:
          name: python-test-evidence
          path: target/downloads/python-test-evidence
      - name: Reuse runtime core evidence
        uses: actions/download-artifact@v8
        with:
          name: release-runtime-core-evidence
          path: target/downloads/release-runtime-core-evidence
      - name: Reuse package/governance evidence
        uses: actions/download-artifact@v8
        with:
          name: release-package-governance-evidence
          path: target/downloads/release-package-governance-evidence
      - name: Reuse user-surface evidence
        uses: actions/download-artifact@v8
        with:
          name: release-user-surface-evidence
          path: target/downloads/release-user-surface-evidence
      - name: Reuse benchmark claim evidence
        uses: actions/download-artifact@v8
        with:
          name: release-benchmark-claim-evidence
          path: target/downloads/release-benchmark-claim-evidence
      - name: Reuse website/docs evidence
        uses: actions/download-artifact@v8
        with:
          name: website-docs-evidence
          path: target/downloads/website-docs-evidence
      - name: Merge downloaded release evidence
        run: |
          python scripts/merge_release_evidence_artifacts.py \
            --artifact target/downloads/ci-gate-matrix-report \
            --artifact target/downloads/dependency-security-evidence \
            --artifact target/downloads/release-local-smoke-evidence \
            --artifact target/downloads/python-test-evidence \
            --artifact target/downloads/release-runtime-core-evidence \
            --artifact target/downloads/release-package-governance-evidence \
            --artifact target/downloads/release-user-surface-evidence \
            --artifact target/downloads/release-benchmark-claim-evidence \
            --artifact target/downloads/website-docs-evidence
      - name: Verify downloaded release evidence
        run: |
          test -f target/ci-gate-matrix-report.json
          test -f target/python-test-evidence.json
          test -f target/dependency-audit-report.json
          test -f target/security-posture-report.json
          test -f target/release-dry-run-proof/transcript.json
          test -f target/release-provenance-dry-run/manifest.json
          test -f target/release-provenance-dry-run/supply-chain-release-evidence.json
          python - <<'PY'
          from pathlib import Path
          assert Path("target/debug/shardloom").is_file()
          assert list(Path("python/dist").glob("shardloom-*.whl"))
          assert list(Path("python/dist").glob("shardloom-*.tar.gz"))
          PY
          test -f target/release-security-gate-report.json
          test -f target/golden-workflow-report.json
          test -d target/golden-workflows
          test -f target/admitted-semantics-matrix-report.json
          test -d target/admitted-semantics-matrix
          test -f target/release-architecture-tracker-report.json
          test -f target/contribution-governance-report.json
          test -f target/package-channel-readiness-report.json
          test -f target/python-user-surface-completion-gate.json
          test -f target/sql-python-dataframe-parity-gate.json
          test -f target/v1-front-door-runtime-scope-report.json
          test -f target/v1-vortex-runtime-scope-report.json
          test -f target/v1-source-prepared-state-scope-report.json
          test -f target/v1-local-output-sink-scope-report.json
          test -f target/user-surface-runtime-gap-inventory.json
          test -f target/user-surface-graduation-matrix.json
          test -f target/runtime-gap-family-burn-down.json
          test -f target/user-route-capability-report.json
          test -f target/pre-5j-dependency-freshness-gate.json
          test -f target/benchmark-artifact-completeness-report.json
          test -f target/benchmark-publication-claim-gate-report.json
          test -f target/front-door-benchmark-publication-gate.json
          test -f target/benchmark-optimization-targets-report.json
          test -f target/public-status-docs-report.json
          test -f target/website-readiness-report.json
      - name: Final release rehearsal
        run: python scripts/final_release_rehearsal.py --allow-blocked
      - name: Production usability gate
        run: python scripts/check_production_usability_gate.py
      - name: V1 API/schema stability gate
        run: python scripts/check_v1_api_schema_stability.py
      - name: V1 correctness/conformance gate
        run: python scripts/check_v1_correctness_conformance.py
      - name: Hard release readiness gate
        continue-on-error: true
        run: python scripts/check_release_readiness.py
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: release-readiness-evidence
          path: |
            target/dependency-audit-report.json
            target/security-posture-report.json
            target/release-dry-run-proof
            target/release-provenance-dry-run
            target/release-security-gate-report.json
            target/contribution-governance-report.json
            target/package-channel-readiness-report.json
            target/golden-workflow-report.json
            target/golden-workflows
            target/admitted-semantics-matrix-report.json
            target/admitted-semantics-matrix
            target/release-architecture-tracker-report.json
            target/final-release-rehearsal
            target/public-status-docs-report.json
            target/website-readiness-report.json
            target/production-usability-gate.json
            target/v1-api-schema-stability-report.json
            target/v1-correctness-conformance-report.json
            target/python-user-surface-completion-gate.json
            target/sql-python-dataframe-parity-gate.json
            target/v1-front-door-runtime-scope-report.json
            target/v1-vortex-runtime-scope-report.json
            target/v1-source-prepared-state-scope-report.json
            target/v1-local-output-sink-scope-report.json
            target/user-surface-runtime-gap-inventory.json
            target/user-surface-graduation-matrix.json
            target/runtime-gap-family-burn-down.json
            target/user-route-capability-report.json
            target/pre-5j-dependency-freshness-gate.json
            target/benchmark-artifact-completeness-report.json
            target/benchmark-publication-claim-gate-report.json
            target/front-door-benchmark-publication-gate.json
            target/benchmark-optimization-targets-report.json
            target/ci-gate-matrix-report.json
            target/python-test-evidence.json
            target/hard-release-readiness-gate.json
          if-no-files-found: ignore
          retention-days: 14

  website-docs:
    name: Website and docs validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website-src/package-lock.json
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install website dependencies
        working-directory: website-src
        run: npm ci
      - name: Build website
        working-directory: website-src
        run: npm run build
      - name: Check website types
        working-directory: website-src
        run: npm run check
      - name: Public status docs
        run: python scripts/check_public_status_docs.py
      - name: Website readiness
        run: python scripts/check_website_readiness.py
      - name: Static asset validation
        run: node website/validate_static_assets.js
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: website-docs-evidence
          path: |
            target/public-status-docs-report.json
            target/website-readiness-report.json
          if-no-files-found: ignore
          retention-days: 14

  ci-gate-matrix:
    name: CI gate matrix contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Validate CI gate matrix
        run: python scripts/check_ci_gate_matrix.py
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ci-gate-matrix-report
          path: target/ci-gate-matrix-report.json
          if-no-files-found: ignore
          retention-days: 14
