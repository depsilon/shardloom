    evidence_fields: [schema_version=shardloom.sql_local_source_smoke.v1, sql_parser_executed=true, sql_binder_executed=true, sql_planner_executed=true, source_io_performed=true, source_format=csv, filter_runtime_execution, predicate_operator_family, in_predicate_runtime_execution, in_list_value_count, aggregate_runtime_execution, aggregate_operator_family, group_by_runtime_execution, group_by_columns, group_by_group_count, order_by_runtime_execution, top_n_runtime_execution, sort_keys, sort_direction, sort_null_ordering, top_n_limit, join_runtime_execution, join_type, join_left_key, join_right_key, join_matched_row_count, join_left_rows_scanned, join_right_rows_scanned, join_rows_output, join_memory_estimate_bytes, output_format, output_io_performed, output_native_io_certificate_status, output_certificate_ref, materialization_boundary, evidence_summary, claim_summary, fallback_attempted=false, external_engine_invoked=false, claim_gate_status=fixture_smoke_only]
    claim_boundary: "Scoped local CSV SELECT projection/optional-filter/limit with comparison, cast, date-literal, bounded IN, null, string, logical, and balanced parenthesized predicates when filters are present; scalar aggregate across all rows or after a scoped filter; one-column group-by aggregate; single-key numeric ORDER BY/LIMIT top-N; ctx.sql local-source collect/write; optional local JSONL or CSV output sinks with format-specific certificate fields; and one Python query-builder local CSV inner equi-join bridge. Bounded IN admits up to 32 non-null scalar literals, including DATE literal lists, and blocks empty, NULL, mixed DATE/non-DATE, and oversized lists. No broad SQL/DataFrame runtime, production SQL support, Parquet/Arrow/Avro/ORC/Vortex output sink, multi-output fanout, object-store/table source, multi-key group-by generality, generalized ordering/null/collation support, NULL/subquery-backed IN, arbitrary predicate-tree completeness beyond admitted parenthesized leaves, outer/semi/anti/cross/multi-key/expression joins, external fallback, or performance claim."
    runnable_example: "New-Item -ItemType Directory -Force target | Out-Null; \"id,customer_id,amount`n1,10,8`n2,20,15`n3,30,21`n4,99,13`n\" | Set-Content -Encoding utf8 target\\sql-local-source-join-fact.csv; \"customer_id,segment`n10,seed`n20,enterprise`n30,startup`n\" | Set-Content -Encoding utf8 target\\sql-local-source-join-dim.csv; cargo run -q -p shardloom-cli -- sql-local-source-smoke \"SELECT f.id,d.segment FROM 'target/sql-local-source-join-fact.csv' AS f INNER JOIN 'target/sql-local-source-join-dim.csv' AS d ON f.customer_id = d.customer_id WHERE f.amount >= 10 LIMIT 10\" --format json; $env:PYTHONPATH = \"python\\src\"; python -c \"from shardloom import context; ctx=context(repo_root='.', profile_order=('debug','release')); r=ctx.read_csv('target/sql-local-source-join-fact.csv').join(ctx.read_csv('target/sql-local-source-join-dim.csv'), on='customer_id').select('f.id','d.segment').filter('f.amount >= 10').limit(10).collect(); print(r.output_row_count, r.join_runtime_execution, r.fallback_attempted, r.external_engine_invoked)\""
