    claim_boundary: "Feature-gated local prepare-once fixture smoke over flat non-null int/uint/float/UTF-8/date32/timestamp rows only; default builds block deterministically. Certification depth is explicit: ingest_minimal records artifact bytes/digest and writer evidence without reopen proof, ingest_certified reopens/scans for row-count proof, and ingest_full_replay is blocked until downstream output replay evidence exists. Python ShardLoomSession reuse is local, caller-owned, and fingerprint-gated only; CLI session-cache-smoke proves only a scoped local cache lifecycle for SourceState, VortexPreparedState, OutputPlan, schema/dictionary caches, invalidation, scratch buffers, and cleanup. No broad Vortex writer, object-store/table sink, production SQL/DataFrame, persistent/distributed cache, performance, superiority, Foundry, package-publication, or Spark-replacement claim."
