    claim_boundary: "Result-sink and fanout smoke is local and scoped; local Vortex output/fanout is feature-gated and flat-scalar only. Local replay/fidelity evidence verifies sink artifacts, and Python ShardLoomSession can reuse local query/output reports only when statement, source fingerprints, and output artifact fingerprints still match. CLI session-cache-smoke proves scoped OutputPlan cache lifecycle, invalidation, close, and cleanup evidence only. This is not broad writer fidelity, S3/object-store write, table commit, persistent OutputPlan cache, broad Vortex writer behavior, or production sink support."
