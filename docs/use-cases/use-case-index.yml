    common_mistakes: [treating_smoke_as_sql_compatibility, expecting_parquet_or_s3_sql_sources, expecting_broad_python_dataframe_join_support, expecting_general_join_or_grouped_aggregate_support, expecting_general_order_by_or_null_ordering_support, expecting_subquery_or_null_in_semantics]
    references: [README.md, docs/getting-started/examples.md, docs/architecture/compute-engine-flow-reference.md, docs/architecture/phased-execution-plan.md]
