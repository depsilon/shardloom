    audience: "user who wants range, sequence, values, calendar, or literal-table output without input data"
    status: smoke_supported
    execution_mode: source_free_generated_output
    engine_mode: batch
    inputs: [none, generated_rows, generated_rows_projection, generated_rows_literal_with_column, literal_table_rows, calendar_dimension, range, sequence, sql_values, sql_literal_select, sql_generate_series_range, ctx_sql_source_free]
    outputs: [local_jsonl_output_artifact, generated_source_certificate, output_native_io_certificate]
    evidence_fields: [input_dataset_count=0, source_io_performed=false, generated_source_created=true, generated_source_kind, generated_source_schema_digest, generated_source_row_count, output_io_performed, generated_source_certificate_status, output_native_io_certificate_status, generated_source_api_admission_schema_version, support_status, blocker_id, fallback_attempted=false, external_engine_invoked=false, claim_gate_status]
