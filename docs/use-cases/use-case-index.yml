    evidence_fields: [schema_version=shardloom.sql_local_source_smoke.v1, sql_parser_executed=true, sql_binder_executed=true, sql_planner_executed=true, source_format, source_io_performed=true, source_state_id, source_state_digest, filter_runtime_execution, predicate_operator_family, in_predicate_runtime_execution, in_list_value_count, aggregate_runtime_execution, aggregate_operator_family, group_by_runtime_execution, group_by_columns, group_by_group_count, order_by_runtime_execution, top_n_runtime_execution, sort_keys, sort_direction, sort_null_ordering, top_n_limit, output_format, output_io_performed=true, output_native_io_certificate_status, output_certificate_ref, evidence_summary, claim_summary, fallback_attempted=false, external_engine_invoked=false, claim_gate_status=fixture_smoke_only]
    claim_boundary: "Scoped Python read_csv/select/optional-filter/limit and read_json/select/optional-filter/limit over local flat .jsonl/.ndjson sources with comparison, cast, date-literal, bounded IN, null, string, logical, and balanced parenthesized predicates when filters are present; preview/select-star over admitted local files; CSV and flat JSONL/NDJSON optional-filter/scalar aggregate/limit, optional-filter/one-column group_by/aggregate/limit, and select/optional-filter/single-key numeric sort/limit collect/write workflows; local JSONL writes and scoped local CSV writes through write_csv(...). No plain .json, nested JSON, JSONPath, pandas/Polars backend, broad DataFrame runtime, generalized grouped aggregate or ordering runtime, named grouped aggregate aliases, NULL/subquery-backed IN, Parquet/Arrow/Avro/ORC/Vortex output sink, multi-output fanout, production SQL support, object-store/table source, external fallback, or performance claim."
    runnable_example: "New-Item -ItemType Directory -Force target | Out-Null; \"id,label,amount`n1,alpha,8`n2,beta,15`n3,beta,21`n4,gamma,`n\" | Set-Content -Encoding utf8 target\\sql-local-source-smoke.csv; $env:PYTHONPATH = \"python\\src\"; python -c \"import shardloom as sl; ctx=sl.context(repo_root='.', profile_order=('debug','release')); preview=ctx.read_csv('target/sql-local-source-smoke.csv').preview(limit=2); workflow=ctx.read_csv('target/sql-local-source-smoke.csv').select('id','label').limit(1); r=workflow.write('target/sql-local-source-result.jsonl', allow_overwrite=True); c=workflow.write_csv('target/sql-local-source-result.csv', allow_overwrite=True); a=ctx.read_csv('target/sql-local-source-smoke.csv').aggregate('count(*)','sum(amount)','avg(amount)').limit(1).collect(); g=ctx.read_csv('target/sql-local-source-smoke.csv').group_by('label').agg('count(*)','sum(amount)').limit(10).collect(); t=ctx.read_csv('target/sql-local-source-smoke.csv').select('id','label').sort('amount', descending=True).limit(2).collect(); print(preview.output_row_count, r.output_path, r.output_native_io_certificate_status, c.output_path, c.output_format, c.output_native_io_certificate_status, a.aggregate_operator_family, g.aggregate_operator_family, g.group_by_columns, t.sort_keys, t.top_n_limit, r.fallback_attempted, r.external_engine_invoked)\""
