    runnable_example: "$env:PYTHONPATH = \"python\\src\"; python -c \"from shardloom import context; ctx=context(repo_root='.'); a=ctx.from_rows([{'id': 1, 'label': 'alpha'}]).write('target/generated-reference.jsonl', allow_overwrite=True); t=ctx.from_rows([{'id': 1, 'label': 'alpha'}, {'id': 2, 'label': 'beta'}]).with_column('batch_id', 1).select('id', 'batch_id').write('target/generated-reference-transformed.jsonl', allow_overwrite=True); b=ctx.literal_table([{'code':'A','weight':1.5}]).write('target/generated-literal.jsonl', allow_overwrite=True); c=ctx.calendar('2026-05-18','2026-05-20', column='dt').write('target/generated-calendar.jsonl', allow_overwrite=True); d=ctx.range(0, 5, column='id').write('target/generated-range.jsonl', allow_overwrite=True); s=ctx.sequence(0, 5, column='id').write('target/generated-sequence.jsonl', allow_overwrite=True); e=ctx.sql_values(\"VALUES (1, 'alpha'), (2, 'beta')\").write('target/generated-sql-values.jsonl', allow_overwrite=True); f=ctx.sql_literal_select(\"SELECT 1 AS id, 'alpha' AS label\").write('target/generated-sql-select.jsonl', allow_overwrite=True); g=ctx.sql(\"SELECT 2 AS id, 'beta' AS label\").write('target/generated-sql-from-context.jsonl', allow_overwrite=True); h=ctx.sql(\"SELECT * FROM generate_series(0, 4)\").write('target/generated-sql-series.jsonl', allow_overwrite=True); print(a.claim_gate_status, t.generated_source_row_count, b.generated_source_kind, c.generated_source_row_count, d.generated_source_kind, s.generated_source_kind, e.generated_source_kind, f.generated_source_kind, g.generated_source_kind, h.generated_source_kind, h.generated_source_range_end_inclusive)\""
