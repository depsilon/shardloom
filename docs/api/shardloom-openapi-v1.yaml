        vortex_prepare_included:
          type: boolean
        vortex_write_reopen_included:
          type: boolean
        direct_transient_execution:
          type: boolean
        vortex_native_claim_allowed:
          type: boolean
        certification_requested:
          type: boolean
        result_sink_requested:
          type: boolean
        prepared_artifact_available:
          type: boolean
        native_vortex_provider_available:
          type: boolean
        mode_supported:
          type: boolean
        support_status:
          type: string
          enum: [supported, unsupported, report_only]
        unsupported_diagnostic_code:
          type: string
        blocker_id:
          type: string
        required_future_evidence:
          type: string
        claim_gate_status:
          type: string
          enum: [fixture_smoke_only, not_claim_grade, unsupported, report_only]
        claim_gate_reason:
          type: string
        fallback_attempted:
