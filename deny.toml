# SPDX-License-Identifier: Apache-2.0

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
  { id = "RUSTSEC-2024-0436", reason = "Transitive unmaintained paste 1.0.15 reaches ShardLoom through upstream Vortex/Arrow/parquet paths. cargo-audit classifies this as a warning with no safe upgrade. Keep waived only until upstream dependency paths remove paste or a compatible Vortex upgrade is available." },
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  "Apache-2.0",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "0BSD",
  "CC0-1.0",
  "Unicode-3.0",
  "Zlib",
]

# cargo-deny 0.19 denies every license not listed in `allow`. The following families are
# therefore denied by omission and must not be added without explicit maintainer/RFC approval:
# GPL-2.0-only, GPL-2.0-or-later, GPL-3.0-only, GPL-3.0-or-later, LGPL-2.0-only,
# LGPL-2.0-or-later, LGPL-2.1-only, LGPL-2.1-or-later, LGPL-3.0-only,
# LGPL-3.0-or-later, AGPL-3.0-only, AGPL-3.0-or-later, SSPL-1.0, BUSL-1.1,
# proprietary, source-available, unknown, and non-SPDX license declarations.
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
