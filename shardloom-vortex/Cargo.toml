[package]
name = "shardloom-vortex"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[features]
default = []
upstream-vortex = ["dep:vortex"]
vortex-file-io = ["upstream-vortex"]
vortex-object-store = ["vortex-file-io"]
vortex-write = ["vortex-file-io"]

[dependencies]
shardloom-core = { path = "../shardloom-core" }
shardloom-exec = { path = "../shardloom-exec" }
shardloom-plan = { path = "../shardloom-plan" }
vortex = { version = "0.70", optional = true }
